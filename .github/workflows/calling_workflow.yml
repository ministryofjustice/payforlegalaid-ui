name: Test AWS Credentials

on: [push]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:

  feature-branch-build:
    uses: './.github/workflows/feature-branch-ci.yml'
    with:
      cookie-secret: 'Jimin'

  metadata-extractor:
    runs-on: ubuntu-latest
    outputs:
      app-version: ${{ steps.read-package-json.outputs.app-version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          sparse-checkout: package.json
          sparse-checkout-cone-mode: false

      - name: Install jq
        shell: bash
        run: |
          if ! command -v jq &> /dev/null; then
            if command -v brew &> /dev/null; then
              brew install jq
            elif command -v apt-get &> /dev/null; then
              sudo apt-get update -qq && sudo apt-get install -y jq
            else
              JQ_VERSION=1.7
              curl -sSL -o /usr/local/bin/jq https://github.com/stedolan/jq/releases/download/jq-$JQ_VERSION/jq-linux64
              chmod +x /usr/local/bin/jq
            fi
          fi

      - name: Validate package.json exists
        id: file-check
        shell: bash
        run: |
          if [ ! -f "package.json" ]; then
          echo "::error::package.json not found in repository root"
          exit 1
          fi

      - name: Extract app version from package.json
        id: read-package-json
        run: |
          APP_VERSION=$(jq -r .version package.json)
          if [ -z "$APP_VERSION" ]; then
            echo "Error: Failed to extract app version from package.json"
            exit 1
          fi
          echo "Extracted app version: $APP_VERSION"
          echo "app-version=$APP_VERSION" >> $GITHUB_OUTPUT

  publish-application-image:
    needs: [feature-branch-build, metadata-extractor]
    uses: './.github/workflows/build-image-workflow.yml'
    secrets: inherit
    with:
      build-number: ${{github.run_number}}
      app-version: ${{ needs.metadata-extractor.outputs.app-version }}
      chart-dir: './helm_deploy/payforlegalaid-ui'
      environment: DEV
      debug: false

  deploy-to-enviroment:
    needs: publish-application-image
    uses: './.github/workflows/environment-deployment-workflow.yml'
    secrets: inherit
    with:
      app-version: ${{ needs.metadata-extractor.outputs.app-version }}
      name: ${{ needs.publish-application-image.outputs.registry }}
      build-number: ${{github.run_number}}
      chart-dir: "./helm_deploy/payforlegalaid-ui"
      release-name: "payforlegalaid-ui"
      image-tag: ${{ needs.publish-application-image.outputs.image-tag }}
      namespace: "laa-get-payments-finance-data-dev"
      environment: DEV
      debug: false

  verify-deployment:
    needs: deploy-to-enviroment
    uses: './.github/workflows/verify-deployment-workflow.yml'
    secrets: inherit
    with:
      release-name: "payforlegalaid-ui"
      app-port: 3000
      namespace: "laa-get-payments-finance-data-dev"
      environment: DEV
      debug: true
