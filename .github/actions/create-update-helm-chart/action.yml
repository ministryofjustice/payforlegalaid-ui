name: "Create or Update Helm Chart"
description: "Create or update a Helm chart and modify values.yaml"
inputs:
  chart-dir:
    description: "The directory where the Helm chart is located"
    required: true
  image-tag:
    description: "The image tag to update in values.yaml"
    required: true
runs:
  using: "composite"
  steps:
    - name: Check if Helm chart exists
      shell: bash
      run: |
        if [ ! -d "${{ inputs.chart-dir }}" ]; then
          echo "Creating new Helm chart in ${{ inputs.chart-dir }}..."
          helm create ${{ inputs.chart-dir }}
        else
          echo "Helm chart already exists in ${{ inputs.chart-dir }}."
        fi

    - name: Validate values.yaml
      shell: bash
      run: |
        set -e  # Fail the script on any error

        VALUES_FILE="${{ inputs.chart-dir }}/values.yaml"
        if [ ! -f "$VALUES_FILE" ]; then
          echo "Error: values.yaml not found in ${{ inputs.chart-dir }}."
          exit 1
        else
          echo "Found values.yaml in ${{ inputs.chart-dir }}."
        fi

    - name: Update values.yaml with new image tag
      shell: bash
      run: |
        set -e  # Fail the script on any error
        
        VALUES_FILE="${{ inputs.chart-dir }}/values.yaml"
        echo "Updating values.yaml with new image tag: ${{ inputs.image-tag }}"
        yq eval ".image.tag = \"${{ inputs.image-tag }}\"" -i $VALUES_FILE
        
        echo "Updated values.yaml:"
        cat $VALUES_FILE

    - name: Add build summary
      shell: bash
      run: |
        echo "### Helm Chart Update Summary" >> $GITHUB_STEP_SUMMARY
        echo "- **Chart Directory:** ${{ inputs.chart-dir }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Chart Name:** $CHART_NAME" >> $GITHUB_STEP_SUMMARY
        echo "- **Image Tag:** ${{ inputs.image-tag }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Updated File:** values.yaml" >> $GITHUB_STEP_SUMMARY